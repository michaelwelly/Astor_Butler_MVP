astor:
  redis:
    fsm-ttl-seconds: ${FSM_REDIS_TTL_SECONDS:259200}
    idempotency-ttl-seconds: ${IDEMPOTENCY_REDIS_TTL_SECONDS:86400}
    key-prefix: ${ASTOR_REDIS_KEY_PREFIX:astor}
  kafka:
    enabled: ${KAFKA_ENABLED:true}
    log-published-events: ${KAFKA_LOG_PUBLISHED_EVENTS:true}
    analytics-admin-chat-enabled: ${KAFKA_ANALYTICS_ADMIN_CHAT_ENABLED:true}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    user-events-topic: ${KAFKA_USER_EVENTS_TOPIC:astor.user.events}
    outbox-user-events-topic: ${KAFKA_OUTBOX_USER_EVENTS_TOPIC:astor.user.events}
    analytics-group-id: ${KAFKA_ANALYTICS_GROUP_ID:astor-admin-events}
    user-events-partitions: ${KAFKA_USER_EVENTS_PARTITIONS:3}
    replication-factor: ${KAFKA_REPLICATION_FACTOR:1}
    outbox-enabled: ${KAFKA_OUTBOX_ENABLED:true}
  media:
    menu-dir: ${ASTOR_MEDIA_MENU_DIR:./media/menu/}
    aeris:
      menu:
        kitchen-object-key: ${AERIS_MENU_KITCHEN_OBJECT_KEY:content/aeris/menu/kitchen/MENU_AERIS_A4_2026_DIGITAL.pdf}
        bar-object-key: ${AERIS_MENU_BAR_OBJECT_KEY:content/aeris/menu/bar/BAR_CARD.pdf}
        elements-object-key: ${AERIS_MENU_ELEMENTS_OBJECT_KEY:content/aeris/menu/elements/ELEMENTS_CARD.pdf}
        wine-object-key: ${AERIS_MENU_WINE_OBJECT_KEY:content/aeris/menu/wine/WINE_MENU_2026_FINAL.pdf}
        rag-source: ${AERIS_MENU_RAG_SOURCE:media_assets:AERIS_MENU_*}
      floor-plan-object-key: ${AERIS_FLOOR_PLAN_OBJECT_KEY:content/aeris/floor-plan/AERIS_PLAN.pdf}
      interior-video-object-key: ${AERIS_INTERIOR_VIDEO_OBJECT_KEY:content/aeris/interior/INTERIOR.mp4}
  storage:
    s3:
      endpoint: ${S3_ENDPOINT:http://localhost:9000}
      public-endpoint: ${S3_PUBLIC_ENDPOINT:http://localhost:9000}
      access-key: ${S3_ACCESS_KEY}
      secret-key: ${S3_SECRET_KEY}
      media-bucket: ${S3_BUCKET_MEDIA:astor-media}
      documents-bucket: ${S3_BUCKET_DOCUMENTS:astor-documents}
      ephemeral-prefix: ${S3_EPHEMERAL_PREFIX:transient}
      voice-prefix: ${S3_VOICE_PREFIX:telegram-voice}
      voice-ttl-days: ${S3_VOICE_TTL_DAYS:3}
  message:
    log-conversations-enabled: ${ASTOR_LOG_CONVERSATIONS_ENABLED:true}
  startup:
    admin-notification-enabled: ${ASTOR_STARTUP_ADMIN_NOTIFICATION_ENABLED:true}
    operational-preview-enabled: ${ASTOR_OPERATIONAL_PREVIEW_ENABLED:true}
  speech-to-text:
    enabled: ${ASTOR_STT_ENABLED:false}
    command: ${ASTOR_STT_COMMAND:}
    work-dir: ${ASTOR_STT_WORK_DIR:/private/tmp/astor-butler-stt}
    timeout-seconds: ${ASTOR_STT_TIMEOUT_SECONDS:30}
    retry-ttl-seconds: ${ASTOR_STT_RETRY_TTL_SECONDS:1800}
    keep-local-files: ${ASTOR_STT_KEEP_LOCAL_FILES:false}
  semantic-memory:
    pgvector:
      enabled: ${ASTOR_SEMANTIC_PGVECTOR_ENABLED:true}
      embedding-dimension: ${ASTOR_SEMANTIC_EMBEDDING_DIMENSION:1536}
      default-model: ${ASTOR_SEMANTIC_EMBEDDING_MODEL:text-embedding-3-small}
    embeddings:
      provider: ${ASTOR_SEMANTIC_EMBEDDINGS_PROVIDER:none}
      model: ${ASTOR_SEMANTIC_EMBEDDING_MODEL:nomic-embed-text}
      ollama-base-url: ${ASTOR_SEMANTIC_OLLAMA_BASE_URL:${LLM_OLLAMA_BASE_URL:http://localhost:11434}}
    intent-examples:
      ingest-golden-corpus-on-startup: ${ASTOR_INTENT_EXAMPLES_INGEST_ON_STARTUP:false}
      golden-corpus: ${ASTOR_INTENT_EXAMPLES_GOLDEN_CORPUS:classpath:understanding/guest-input-golden-corpus.jsonl}
  timeline:
    scylla:
      enabled: ${ASTOR_TIMELINE_SCYLLA_ENABLED:false}
      host: ${ASTOR_TIMELINE_SCYLLA_HOST:localhost}
      port: ${ASTOR_TIMELINE_SCYLLA_PORT:9042}
      datacenter: ${ASTOR_TIMELINE_SCYLLA_DATACENTER:datacenter1}
      keyspace: ${ASTOR_TIMELINE_SCYLLA_KEYSPACE:astor_timeline}
      table: ${ASTOR_TIMELINE_SCYLLA_TABLE:guest_fsm_timeline_by_guest}
      schema-timeout-seconds: ${ASTOR_TIMELINE_SCYLLA_SCHEMA_TIMEOUT_SECONDS:30}
  graph-memory:
    neo4j:
      enabled: ${ASTOR_GRAPH_NEO4J_ENABLED:false}
      uri: ${ASTOR_GRAPH_NEO4J_URI:bolt://localhost:7687}
      username: ${ASTOR_GRAPH_NEO4J_USERNAME:neo4j}
      password: ${ASTOR_GRAPH_NEO4J_PASSWORD:astor_graph_password}
  content:
    telegram:
      public-channel:
        enabled: ${ASTOR_AERIS_CHANNEL_INGEST_ENABLED:true}
        scheduled-enabled: ${ASTOR_AERIS_CHANNEL_INGEST_SCHEDULED_ENABLED:false}
        fixed-delay-ms: ${ASTOR_AERIS_CHANNEL_INGEST_FIXED_DELAY_MS:1800000}
        timeout-seconds: ${ASTOR_AERIS_CHANNEL_INGEST_TIMEOUT_SECONDS:8}
        asset-mirroring-enabled: ${ASTOR_AERIS_CHANNEL_ASSET_MIRRORING_ENABLED:true}
        asset-timeout-seconds: ${ASTOR_AERIS_CHANNEL_ASSET_TIMEOUT_SECONDS:12}
        asset-max-bytes: ${ASTOR_AERIS_CHANNEL_ASSET_MAX_BYTES:25000000}
        venue-code: ${ASTOR_AERIS_CHANNEL_VENUE_CODE:AERIS}
        username: ${ASTOR_AERIS_CHANNEL_USERNAME:aeris_gastrobar}
        url: ${ASTOR_AERIS_CHANNEL_URL:https://t.me/s/aeris_gastrobar}

spring:
  application:
    name: astor-butler

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.cassandra.CassandraAutoConfiguration
      - org.springframework.boot.autoconfigure.neo4j.Neo4jAutoConfiguration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
    mongodb:
      uri: ${MONGODB_URI}

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  liquibase:
    change-log: ${SPRING_LIQUIBASE_CHANGE_LOG:classpath:/db/changelog/changelog-master.yaml}
    enabled: true

telegram:
  bot:
    enabled: ${TELEGRAM_BOT_ENABLED:false}
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:astor_butler_bot}
  ui:
    preview-enabled: ${TELEGRAM_UI_PREVIEW_ENABLED:true}
    cleanup-enabled: ${TELEGRAM_UI_CLEANUP_ENABLED:false}
    delete-user-messages-enabled: ${TELEGRAM_UI_DELETE_USER_MESSAGES_ENABLED:false}
    preview-version: ${TELEGRAM_UI_PREVIEW_VERSION:2026-06-17-weekend-rc}
    preview-avatar-path: ${TELEGRAM_UI_PREVIEW_AVATAR_PATH:classpath:telegram/aeris-butler-preview.png}
  voice:
    download-enabled: ${TELEGRAM_VOICE_DOWNLOAD_ENABLED:true}
  admin:
    chat-id: ${TELEGRAM_ADMIN_CHAT_ID:}
  analytics:
    chat-id: ${TELEGRAM_ANALYTICS_CHAT_ID:${TELEGRAM_ADMIN_CHAT_ID:}}
    min-send-interval-ms: ${TELEGRAM_ANALYTICS_MIN_SEND_INTERVAL_MS:3200}
    max-retries: ${TELEGRAM_ANALYTICS_MAX_RETRIES:2}
  system:
    chat-id: ${TELEGRAM_SYSTEM_CHAT_ID:}
    notifications-enabled: ${TELEGRAM_SYSTEM_NOTIFICATIONS_ENABLED:false}
  booking:
    notifications-enabled: ${TELEGRAM_BOOKING_NOTIFICATIONS_ENABLED:true}
    manager-chat-id: ${TELEGRAM_BOOKING_MANAGER_CHAT_ID:876857557}
    hostess-chat-id: ${TELEGRAM_HOSTESS_CHAT_ID:}
    plan-pdf-asset-code: ${TELEGRAM_BOOKING_PLAN_PDF_ASSET_CODE:AERIS_FLOOR_PLAN}
  quiet-guide:
    interior-video-asset-code: ${TELEGRAM_QUIET_GUIDE_INTERIOR_VIDEO_ASSET_CODE:AERIS_INTERIOR_TOUR}
  oauth:
    client-id: ${TELEGRAM_CLIENT_ID:}
    redirect-uri: ${TELEGRAM_REDIRECT_URI:http://localhost:8080/auth/telegram/callback}

llm:
  ollama:
    base-url: ${LLM_OLLAMA_BASE_URL:http://localhost:11434}
    model: ${LLM_OLLAMA_MODEL:qwen2.5:1.5b}
    keep-alive: ${LLM_OLLAMA_KEEP_ALIVE:30m}
    warmup-enabled: ${LLM_WARMUP_ENABLED:true}
    warmup-interval-seconds: ${LLM_WARMUP_INTERVAL_SECONDS:120}
    connect-timeout-ms: ${LLM_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${LLM_READ_TIMEOUT_MS:8000}

yandex:
  ai:
    agent-endpoint: ${YANDEX_AGENT_ENDPOINT:https://ai.api.cloud.yandex.net/v1/agents/fvt51f9cslgi648vvg35:execute}
    folder-id: ${YANDEX_FOLDER_ID:}
    iam-token: ${YANDEX_IAM_TOKEN:}

server:
  port: ${SERVER_PORT:8088}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    cassandra:
      enabled: false
    neo4j:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.apache.kafka: WARN
