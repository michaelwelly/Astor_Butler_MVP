spring:
  config:
    activate:
      on-profile: preprod

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
    mongodb:
      uri: ${MONGODB_URI}

logging:
  level:
    root: INFO
    museon_online.astor_butler: INFO

llm:
  ollama:
    base-url: ${OLLAMA_BASE_URL}
    model: ${OLLAMA_MODEL:qwen2.5:1.5b}
