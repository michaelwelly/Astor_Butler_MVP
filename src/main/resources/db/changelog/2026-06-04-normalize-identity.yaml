databaseChangeLog:
  - changeSet:
      id: normalize-identity-user-telegram-links
      author: astor-butler
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - tableExists:
            tableName: users
        - tableExists:
            tableName: telegram_profiles
        - tableExists:
            tableName: telegram_messages
        - tableExists:
            tableName: user_consents
      changes:
        - sqlFile:
            path: db/changelog/2026-06-04-normalize-identity.sql
            splitStatements: true
            stripComments: false
