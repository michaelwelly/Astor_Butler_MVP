  </defs>
  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="#ffffff" opacity="0.04" filter="url(#grain)"/>
  <g fill="none" stroke="#c8940a" stroke-opacity="0.5" stroke-width="3">
    <circle cx="540" cy="860" r="120"/>
    <path d="M500 800 L500 920 L600 860 Z" fill="#c8940a" fill-opacity="0.5" stroke="none"/>
  </g>
  <text x="540" y="1110" text-anchor="middle" font-family="Georgia, serif" font-size="74" letter-spacing="-2" fill="#e8e4dc">
    C3<tspan fill="#e8e4dc" opacity="0.7">FLEX</tspan>
  </text>
  <text x="540" y="1170" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" letter-spacing="6" fill="#e8e4dc" opacity="0.45">
