services:
  api-gateway:
    image: nginx:1.27-alpine
    container_name: astor_api_gateway
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      ASTOR_BACKEND_UPSTREAM: ${ASTOR_BACKEND_UPSTREAM:-host.docker.internal:8088}
    volumes:
      - ./docker/nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
    command: >
      sh -c "host=$${ASTOR_BACKEND_UPSTREAM%:*};
      if [ \"$$host\" != \"host.docker.internal\" ]; then
      until getent hosts \"$$host\" >/dev/null 2>&1; do echo waiting for $$host; sleep 1; done;
      fi;
      envsubst '$$ASTOR_BACKEND_UPSTREAM' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf &&
      nginx -g 'daemon off;'"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/gateway/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    image: astor-butler-mvp:local
    container_name: astor_app
    environment:
      SERVER_PORT: 8088
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-aether}
      POSTGRES_USER: ${POSTGRES_USER:-oracle}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astor_unlock}
      SPRING_LIQUIBASE_CHANGE_LOG: ${SPRING_LIQUIBASE_CHANGE_LOG:-classpath:db/changelog/changelog-master.yaml}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MONGODB_URI: mongodb://${MONGO_USER:-oracle}:${MONGO_PASSWORD:-astor_unlock}@mongo:27017/${MONGO_DB:-aether}?authSource=admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_USER_EVENTS_TOPIC: ${KAFKA_USER_EVENTS_TOPIC:-astor.user.events}
      KAFKA_OUTBOX_USER_EVENTS_TOPIC: ${KAFKA_OUTBOX_USER_EVENTS_TOPIC:-astor.user.events}
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-astor}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-astor_minio_password}
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA:-astor-media}
      S3_BUCKET_DOCUMENTS: ${S3_BUCKET_DOCUMENTS:-astor-documents}
      TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED:-false}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-astor_butler_bot}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      TELEGRAM_ANALYTICS_CHAT_ID: ${TELEGRAM_ANALYTICS_CHAT_ID:-}
      TELEGRAM_HOSTESS_CHAT_ID: ${TELEGRAM_HOSTESS_CHAT_ID:-}
      TELEGRAM_QUIET_GUIDE_INTERIOR_VIDEO_OBJECT_KEY: ${TELEGRAM_QUIET_GUIDE_INTERIOR_VIDEO_OBJECT_KEY:-content/aeris/interior/INTERIOR.mp4}
      TELEGRAM_CLIENT_ID: ${TELEGRAM_CLIENT_ID:-}
      TELEGRAM_REDIRECT_URI: ${APP_TELEGRAM_REDIRECT_URI:-http://localhost:8080/auth/telegram/callback}
      LLM_OLLAMA_BASE_URL: ${APP_LLM_OLLAMA_BASE_URL:-http://llm-gateway:11434}
      LLM_OLLAMA_MODEL: ${LLM_OLLAMA_MODEL:-qwen2.5:1.5b}
      LLM_WARMUP_ENABLED: ${LLM_WARMUP_ENABLED:-false}
      LLM_CONNECT_TIMEOUT_MS: ${LLM_CONNECT_TIMEOUT_MS:-5000}
      LLM_READ_TIMEOUT_MS: ${LLM_READ_TIMEOUT_MS:-45000}
      LLM_OLLAMA_KEEP_ALIVE: ${LLM_OLLAMA_KEEP_ALIVE:-30m}
      ASTOR_STT_ENABLED: ${ASTOR_STT_ENABLED:-true}
      ASTOR_STT_COMMAND: ${ASTOR_STT_COMMAND:-python3 /app/stt_faster_whisper.py {file}}
      ASTOR_STT_TIMEOUT_SECONDS: ${ASTOR_STT_TIMEOUT_SECONDS:-90}
      ASTOR_STT_RETRY_TTL_SECONDS: ${ASTOR_STT_RETRY_TTL_SECONDS:-1800}
      ASTOR_STT_MODEL: ${ASTOR_STT_MODEL:-base}
      ASTOR_STT_LANGUAGE: ${ASTOR_STT_LANGUAGE:-ru}
      ASTOR_STT_DEVICE: ${ASTOR_STT_DEVICE:-cpu}
      ASTOR_STT_COMPUTE_TYPE: ${ASTOR_STT_COMPUTE_TYPE:-int8}
      HF_HOME: /root/.cache/huggingface
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
      YANDEX_IAM_TOKEN: ${YANDEX_IAM_TOKEN:-}
      YANDEX_AGENT_ENDPOINT: ${YANDEX_AGENT_ENDPOINT:-}
      JWT_SECRET: ${JWT_SECRET:-local-container-dev-only}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8088/actuator/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  postgres:
    image: postgres:16
    container_name: astor_postgres_test
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-astor_butler_test}
      POSTGRES_USER: ${POSTGRES_USER:-astor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-astor}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: astor_redis_test
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    entrypoint: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"; else exec redis-server --appendonly yes; fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: astor_mongo_test
    command: ["mongod", "--auth", "--bind_ip_all"]
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB:-aether}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-oracle}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-astor_unlock}
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok'"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.7
    container_name: astor_kafka_test
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://kafka:9092,EXTERNAL://localhost:${KAFKA_PORT:-9092}
    ports:
      - "${KAFKA_PORT:-9092}:19092"
      - "${SCHEMA_REGISTRY_PORT:-8082}:8081"
    volumes:
      - kafkadata:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.6.0
    container_name: astor_redpanda_console
    ports:
      - "${REDPANDA_CONSOLE_PORT:-8081}:8080"
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  debezium-connect:
    image: debezium/connect:2.7.3.Final
    container_name: astor_debezium_connect
    ports:
      - "${DEBEZIUM_CONNECT_PORT:-8083}:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: astor-debezium-connect
      CONFIG_STORAGE_TOPIC: astor.connect.configs
      OFFSET_STORAGE_TOPIC: astor.connect.offsets
      STATUS_STORAGE_TOPIC: astor.connect.statuses
      KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  llm-gateway:
    profiles: ["ai"]
    image: nginx:1.27-alpine
    container_name: astor_llm_gateway
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ./docker/llm/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      ollama-1:
        condition: service_healthy
      ollama-2:
        condition: service_healthy
      ollama-3:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:11434/api/tags >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  ollama-1:
    profiles: ["ai"]
    image: ollama/ollama:latest
    container_name: astor_ollama_1
    environment:
      OLLAMA_KEEP_ALIVE: ${LLM_OLLAMA_KEEP_ALIVE:-30m}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  ollama-2:
    profiles: ["ai"]
    image: ollama/ollama:latest
    container_name: astor_ollama_2
    environment:
      OLLAMA_KEEP_ALIVE: ${LLM_OLLAMA_KEEP_ALIVE:-30m}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  ollama-3:
    profiles: ["ai"]
    image: ollama/ollama:latest
    container_name: astor_ollama_3
    environment:
      OLLAMA_KEEP_ALIVE: ${LLM_OLLAMA_KEEP_ALIVE:-30m}
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-1}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: astor_minio_test
    command: server /data --console-address ":9001"
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-astor}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-astor_minio_password}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: astor_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_BUCKET_MEDIA: ${S3_BUCKET_MEDIA:-astor-media}
      S3_BUCKET_DOCUMENTS: ${S3_BUCKET_DOCUMENTS:-astor-documents}
      S3_EPHEMERAL_PREFIX: ${S3_EPHEMERAL_PREFIX:-transient}
      S3_VOICE_PREFIX: ${S3_VOICE_PREFIX:-telegram-voice}
      S3_VOICE_TTL_DAYS: ${S3_VOICE_TTL_DAYS:-3}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-astor}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-astor_minio_password}
    entrypoint: >
      sh -c 'mc alias set astor http://minio:9000 "$$S3_ACCESS_KEY" "$$S3_SECRET_KEY" &&
      mc mb --ignore-existing astor/"$$S3_BUCKET_MEDIA" &&
      mc mb --ignore-existing astor/"$$S3_BUCKET_DOCUMENTS" &&
      (mc ilm rule add astor/"$$S3_BUCKET_MEDIA" --expire-days "$$S3_VOICE_TTL_DAYS" --prefix "$$S3_EPHEMERAL_PREFIX/$$S3_VOICE_PREFIX/" || true)'

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: astor_prometheus_test
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    depends_on:
      - postgres
      - redis

  grafana:
    image: grafana/grafana:10.4.3
    container_name: astor_grafana_test
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  mongodata:
  kafkadata:
  ollama_data:
  miniodata:
  huggingface-cache:
  prometheusdata:
  grafanadata:
