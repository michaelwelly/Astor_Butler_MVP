global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: astor-butler
    metrics_path: /actuator/prometheus
    scrape_interval: 60s
    static_configs:
      - targets:
          - api-gateway:8080
