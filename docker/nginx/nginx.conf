worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format astor '$remote_addr - $request_id [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     'rt=$request_time uct=$upstream_connect_time '
                     'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log astor;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=swagger_limit:10m rate=3r/s;

    upstream astor_backend {
        least_conn;
        server host.docker.internal:8088 max_fails=3 fail_timeout=10s;
        keepalive 32;

        # Production target shape:
        # server astor-app-1:8088 max_fails=3 fail_timeout=10s;
        # server astor-app-2:8088 max_fails=3 fail_timeout=10s;
        # server astor-app-3:8088 max_fails=3 fail_timeout=10s;
    }

    server {
        listen 8080;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        location = /gateway/health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "api-gateway: ok\n";
        }

        location = / {
            return 302 /swagger-ui/index.html;
        }

        location /swagger-ui/ {
            limit_req zone=swagger_limit burst=10 nodelay;
            proxy_pass http://astor_backend;
        }

        location /v3/api-docs {
            limit_req zone=swagger_limit burst=10 nodelay;
            proxy_pass http://astor_backend;
        }

        location /actuator/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://astor_backend;
        }

        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://astor_backend;
        }

        location /auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://astor_backend;
        }

        location / {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://astor_backend;
        }
    }
}
